<!DOCTYPE html>
<html>
<head>
    <title>Login - OJT Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h2 style="text-align:center;">ESSU OJT Tracker</h2>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button class="btn-primary" style="width:100%;" onclick="login()">
            Login
        </button>

        <p id="errorMsg" style="color:red;"></p>
        <p class="mt-3">Don't have an account? <a href="signup.html">Sign up</a> here.</p>
    </div>
</div>

<script>
async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
        localStorage.setItem("token", data.token);

        const payload = JSON.parse(atob(data.token.split('.')[1]));

        if (payload.role === "student")
            window.location = "student.html";
        else if (payload.role === "admin")
            window.location = "admin.html";
        else
            window.location = "supervisor.html";

    } else {
        document.getElementById("errorMsg").innerText =
            data.message;
    }
}
</script>

</body>
</html>
