<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sign Up - OJT Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title mb-3">Create Student Account</h4>
          <div class="row g-2">
            <div class="col-md-6 mb-3">
              <label class="form-label">Last name</label>
              <input id="last_name" class="form-control" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">First name</label>
              <input id="first_name" class="form-control" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Middle name</label>
              <input id="middle_name" class="form-control" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Suffix</label>
              <input id="suffix" class="form-control" placeholder="Jr., Sr., III (optional)" />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Student ID</label>
            <input id="student_id" class="form-control" pattern="[A-Za-z0-9]{2}-[A-Za-z0-9]{5}" placeholder="e.g. AB-12345" required title="Format: xx-xxxxx (alphanumeric)" />
          </div>
          <div class="mb-3">
            <label class="form-label">Course</label>
            <select id="course" class="form-select">
              <option value="">Select course</option>
              <option>Bachelor Of Science In Agriculture</option>
              <option>Bachelor Of Arts In Communication</option>
              <option>Bachelor Of Arts In Political Science</option>
              <option>Bachelor Of Science In Social Work</option>
              <option>Bachelor Of Science In Accountancy</option>
              <option>Bachelor Of Science In Accounting Information System</option>
              <option>Bachelor Of Science In Business Administration - Major In Business Economics</option>
              <option>Bachelor Of Science In Business Administration - Major In Financial Management</option>
              <option>Bachelor Of Science In Business Administration - Major In Human Resource Management</option>
              <option>Bachelor Of Science In Business Administration - Major In Marketing Management</option>
              <option>Associate in Computer Technology</option>
              <option>Bachelor Of Science In Computer Science</option>
              <option>Bachelor Of Science In Entertainment And Multimedia Computing</option>
              <option>Bachelor Of Science In Information Technology</option>
              <option>Bachelor Of Science In Criminology</option>
              <option>Bachelor Of Elementary Education</option>
              <option>Bachelor Of Secondary Education - Major In English</option>
              <option>Bachelor Of Secondary Education - Major In Filipino</option>
              <option>Bachelor Of Secondary Education - Major In Mathematics</option>
              <option>Bachelor Of Secondary Education - Major In Science</option>
              <option>Bachelor Of Secondary Education - Major In Social Studies</option>
              <option>Bachelor Of Science In Civil Engineering</option>
              <option>Bachelor Of Science In Computer Engineering</option>
              <option>Bachelor Of Science In Electrical Engineering</option>
              <option>Bachelor Of Science In Fisheries</option>
              <option>Bachelor Of Science In Hospitality Management</option>
              <option>Bachelor Of Science In Tourism Management</option>
              <option>Bachelor Of Science In Midwifery</option>
              <option>Bachelor Of Science In Nursing</option>
              <option>Bachelor Of Science In Nutrition & Dietetics</option>
              <option>Bachelor Of Science In Biology</option>
              <option>Bachelor Of Science In Environmental Science</option>
              <option>Bachelor In Industrial Technology</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Address</label>
            <input id="address" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input id="age" type="number" min="0" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" type="email" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" />
          </div>
          <div class="d-flex flex-column align-items-center mt-4">
            <button onclick="signup()" class="btn btn-primary btn-lg">Sign up</button>
            <p class="mt-2 mb-0">Already have an account? <a href="login.html">Log in</a> here.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
async function signup(){
  const last_name = document.getElementById('last_name').value;
  const first_name = document.getElementById('first_name').value;
  const middle_name = document.getElementById('middle_name').value;
  const suffix = document.getElementById('suffix').value;
  const student_id = document.getElementById('student_id').value;
  const address = document.getElementById('address').value;
  const age = document.getElementById('age').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if(!last_name || !first_name || !student_id || !email || !password){
    alert('Please fill required fields (last, first, student ID, email, password)');
    return;
  }

  const course = document.getElementById('course').value;

  const res = await fetch('/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      last_name,first_name,middle_name,suffix,student_id,course,address,age,email,password,role:'student'
    })
  });

  if(res.ok){
    alert('Account created — please log in');
    window.location = 'login.html';
  } else {
    const err = await res.json().catch(()=>({message:'Error'}));
    alert(err.message || 'Registration failed');
  }
}
</script>
</body>
</html>
